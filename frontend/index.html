<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Gujarat Step Counter - Walk. Compete. Win. District-level step count leaderboard competition for Gujarat.">
  <meta name="theme-color" content="#0A0E17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Gujarat Step Counter | ગુજરાત સ્ટેપ કાઉન્ટર</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="app-container" id="app">
    
    <!-- Top Navigation -->
    <nav class="top-nav" id="topNav" style="display:none;">
      <div class="logo">
        <div class="logo-icon">🏃</div>
        <span class="logo-text" data-i18n="appName">Gujarat Step Counter</span>
      </div>
      <div class="nav-actions">
        <button id="themeToggleBtn" onclick="toggleTheme()" style="background:none;border:none;font-size:20px;cursor:pointer;padding:8px;margin-right:8px;display:flex;align-items:center;justify-content:center;color:var(--text-primary);">☀️</button>
        <div class="lang-toggle">
          <button class="lang-btn active" id="langEn" onclick="setLanguage('en')">EN</button>
          <button class="lang-btn" id="langGu" onclick="setLanguage('gu')">ગુ</button>
        </div>
      </div>
    </nav>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Page Container -->
    <main id="pageContainer"></main>

    <!-- Bottom Tab Bar -->
    <nav class="bottom-bar" id="bottomBar" style="display:none;">
      <button class="tab-btn active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="tab-icon">🏠</span>
        <span data-i18n="home">Home</span>
      </button>
      <button class="tab-btn" data-page="activity" onclick="navigate('activity')">
        <span class="tab-icon">📊</span>
        <span data-i18n="activity">Activity</span>
      </button>
      <button class="tab-btn" data-page="leaderboard" onclick="navigate('leaderboard')">
        <span class="tab-icon">🏆</span>
        <span data-i18n="leaderboard">Leaderboard</span>
      </button>
      <button class="tab-btn" data-page="profile" onclick="navigate('profile')">
        <span class="tab-icon">👤</span>
        <span data-i18n="profile">Profile</span>
      </button>
    </nav>
  </div>

  <!-- SVG Gradient Definition for Step Ring -->
  <svg style="position:absolute;width:0;height:0;">
    <defs>
      <linearGradient id="stepGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#FF6B35"/>
        <stop offset="100%" style="stop-color:#F7C948"/>
      </linearGradient>
    </defs>
  </svg>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ads.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
